format = """
$directory\
$git_branch\
$git_status\
$fill\
$python\
$lua\
$nodejs\
$golang\
$haskell\
$rust\
$ruby\
$package\
$docker_context\
$jobs\
$cmd_duration\
$line_break\
$character"""

add_newline = true

[directory]
style = 'bold fg:blue'
format = '[$path ]($style)'
truncation_length = 3
truncation_symbol = '…/'
truncate_to_repo = false

[directory.substitutions]
'Documents' = '󰈙'
'Downloads' = ' '
'Music' = ' '
'Pictures' = ' '

[git_branch]
style = 'fg:green'
symbol = ' '
format = '[on](white) [$symbol$branch ]($style)'

[git_status]
style = 'fg:green'
format = '([$all_status$ahead_behind]($style) )'

[fill]
symbol = ' '

[python]
style = 'teal'
symbol = ' '
format = '[${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
pyenv_version_name = true
pyenv_prefix = ''

[lua]
symbol = ' '

[nodejs]
style = 'blue'
symbol = ' '

[golang]
style = 'blue'
symbol = ' '

[rust]
style = 'orange'
symbol = ' '

[package]
symbol = ' '

[docker_context]
symbol = ' '
style = 'fg:#06969A'
format = '[$symbol]($style) $path'
detect_files = ['docker-compose.yml', 'docker-compose.yaml', 'Dockerfile']
detect_extensions = ['Dockerfile']

[jobs]
symbol = ' '
style = 'red'
number_threshold = 1
format = '[$symbol]($style)'

[cmd_duration]
min_time = 500
style = 'fg:gray'
format = '[$duration]($style)'

palette = "rose_pine"

[palettes.rose_pine]
rosewater = "#e0def4"
pink = "#eb6f92"
mauve = "#c4a7e7"
lavender = "#c4a7e7"
red = "#eb6f92"
maroon = "#eb6f92"
peach = "#ea9a97"
yellow = "#f6c177"
green = "#9ccfd8"
teal = "#9ccfd8"
sky = "#9ccfd8"
sapphire = "#c4a7e7"
blue = "#c4a7e7"
text = "#e0def4"
subtext1 = "#908caa"
subtext0 = "#6e6a86"
overlay2 = "#56527e"
overlay1 = "#44415a"
overlay0 = "#393552"
surface2 = "#26233a"
surface1 = "#1f1d30"
surface0 = "#191724"
base = "#191724"
mantle = "#1f1d2e"
crust = "#191724"
