format = """
$directory\
$git_branch\
$git_status\
$fill\
$python\
$lua\
$nodejs\
$golang\
$haskell\
$rust\
$ruby\
$package\
$docker_context\
$jobs\
$cmd_duration\
$line_break\
$character"""

add_newline = true

[directory]
style = 'bold fg:blue'
format = '[$path ]($style)'
truncation_length = 3
truncation_symbol = '…/'
truncate_to_repo = false

[directory.substitutions]
'Documents' = '󰈙'
'Downloads' = ' '
'Music' = ' '
'Pictures' = ' '

[git_branch]
style = 'fg:green'
symbol = ' '
format = '[on](white) [$symbol$branch ]($style)'

[git_status]
style = 'fg:green'
format = '([$all_status$ahead_behind]($style) )'

[fill]
symbol = ' '

[python]
style = 'teal'
symbol = ' '
format = '[${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
pyenv_version_name = true
pyenv_prefix = ''

[lua]
symbol = ' '

[nodejs]
style = 'blue'
symbol = ' '

[golang]
style = 'blue'
symbol = ' '

[rust]
style = 'orange'
symbol = ' '

[package]
symbol = ' '

[docker_context]
symbol = ' '
style = 'fg:#06969A'
format = '[$symbol]($style) $path'
detect_files = ['docker-compose.yml', 'docker-compose.yaml', 'Dockerfile']
detect_extensions = ['Dockerfile']

[jobs]
symbol = ' '
style = 'red'
number_threshold = 1
format = '[$symbol]($style)'

[cmd_duration]
min_time = 500
style = 'fg:gray'
format = '[$duration]($style)'

palette = "kanagawa"

[palettes.kanagawa]
rosewater = "#dcd7ba"
pink = "#d27e99"
mauve = "#957fb8"
lavender = "#9cabca"
red = "#c34043"
maroon = "#e82424"
peach = "#e98a3a"
yellow = "#c0a36e"
green = "#76946a"
teal = "#6a9589"
sky = "#7fb4ca"
sapphire = "#7e9cd8"
blue = "#7e9cd8"
text = "#dcd7ba"
subtext1 = "#c8c093"
subtext0 = "#727169"
overlay2 = "#54546d"
overlay1 = "#54546d"
overlay0 = "#363646"
surface2 = "#2a2a37"
surface1 = "#223249"
surface0 = "#1f1f28"
base = "#1f1f28"
mantle = "#16161d"
crust = "#16161d"
