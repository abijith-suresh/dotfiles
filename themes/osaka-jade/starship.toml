format = """
$directory\
$git_branch\
$git_status\
$fill\
$python\
$lua\
$nodejs\
$golang\
$haskell\
$rust\
$ruby\
$package\
$docker_context\
$jobs\
$cmd_duration\
$line_break\
$character"""

add_newline = true

palette = "osaka_jade"

[palettes.osaka_jade]
rosewater = "#c8c8c8"
pink = "#c470a8"
mauve = "#a870c4"
lavender = "#a870c4"
red = "#c47070"
maroon = "#a85050"
peach = "#c49070"
yellow = "#c4b070"
green = "#6ea878"
teal = "#70c4a8"
sky = "#70a8c4"
sapphire = "#70a8c4"
blue = "#70a8c4"
text = "#c8c8c8"
subtext1 = "#989898"
subtext0 = "#707070"
overlay2 = "#585858"
overlay1 = "#404040"
overlay0 = "#303030"
surface2 = "#283430"
surface1 = "#1e2a28"
surface0 = "#182220"
base = "#182220"
mantle = "#141a18"
crust = "#101614"
[directory]
style = 'bold fg:blue'
format = '[$path ]($style)'
truncation_length = 3
truncation_symbol = '…/'
truncate_to_repo = false

[directory.substitutions]
'Documents' = '󰈙'
'Downloads' = ' '
'Music' = ' '
'Pictures' = ' '

[git_branch]
style = 'fg:green'
symbol = ' '
format = '[on](white) [$symbol$branch ]($style)'

[git_status]
style = 'fg:green'
format = '([$all_status$ahead_behind]($style) )'

[fill]
symbol = ' '

[python]
style = 'teal'
symbol = ' '
format = '[${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
pyenv_version_name = true
pyenv_prefix = ''

[lua]
symbol = ' '

[nodejs]
style = 'blue'
symbol = ' '

[golang]
style = 'blue'
symbol = ' '

[rust]
style = 'orange'
symbol = ' '

[package]
symbol = '󰏗 '

[docker_context]
symbol = ' '
style = 'fg:#06969A'
format = '[$symbol]($style) $path'
detect_files = ['docker-compose.yml', 'docker-compose.yaml', 'Dockerfile']
detect_extensions = ['Dockerfile']

[jobs]
symbol = ' '
style = 'red'
number_threshold = 1
format = '[$symbol]($style)'

[cmd_duration]
min_time = 500
style = 'fg:gray'
format = '[$duration]($style)'
