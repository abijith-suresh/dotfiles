format = """
$directory\
$git_branch\
$git_status\
$fill\
$python\
$lua\
$nodejs\
$golang\
$haskell\
$rust\
$ruby\
$package\
$docker_context\
$jobs\
$cmd_duration\
$line_break\
$character"""

add_newline = true

palette = "matte_black"

[palettes.matte_black]
rosewater = "#c8c8c8"
pink = "#d4756e"
mauve = "#af8fd4"
lavender = "#af8fd4"
red = "#d4756e"
maroon = "#b45050"
peach = "#d49f6e"
yellow = "#d4b475"
green = "#8faf77"
teal = "#77c7af"
sky = "#8fafd4"
sapphire = "#8fafd4"
blue = "#8fafd4"
text = "#c8c8c8"
subtext1 = "#a0a0a0"
subtext0 = "#787878"
overlay2 = "#585858"
overlay1 = "#404040"
overlay0 = "#303030"
surface2 = "#262626"
surface1 = "#1e1e1e"
surface0 = "#1a1a1a"
base = "#1a1a1a"
mantle = "#161616"
crust = "#131313"
[directory]
style = 'bold fg:blue'
format = '[$path ]($style)'
truncation_length = 3
truncation_symbol = '…/'
truncate_to_repo = false

[directory.substitutions]
'Documents' = '󰈙'
'Downloads' = ' '
'Music' = ' '
'Pictures' = ' '

[git_branch]
style = 'fg:green'
symbol = ' '
format = '[on](white) [$symbol$branch ]($style)'

[git_status]
style = 'fg:green'
format = '([$all_status$ahead_behind]($style) )'

[fill]
symbol = ' '

[python]
style = 'teal'
symbol = ' '
format = '[${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
pyenv_version_name = true
pyenv_prefix = ''

[lua]
symbol = ' '

[nodejs]
style = 'blue'
symbol = ' '

[golang]
style = 'blue'
symbol = ' '

[rust]
style = 'orange'
symbol = ' '

[package]
symbol = '󰏗 '

[docker_context]
symbol = ' '
style = 'fg:#06969A'
format = '[$symbol]($style) $path'
detect_files = ['docker-compose.yml', 'docker-compose.yaml', 'Dockerfile']
detect_extensions = ['Dockerfile']

[jobs]
symbol = ' '
style = 'red'
number_threshold = 1
format = '[$symbol]($style)'

[cmd_duration]
min_time = 500
style = 'fg:gray'
format = '[$duration]($style)'
