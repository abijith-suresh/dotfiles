"$schema" = "https://starship.rs/config-schema.json"

# Layout based on official Starship presets:
# - pure-preset
# - nerd-font-symbols
format = """
$directory\
$git_branch\
$git_state\
$git_status\
$git_metrics\
$cmd_duration\
$line_break\
$character"""

right_format = "$package"

add_newline = true

palette = "catppuccin_mocha"

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo  = "#f2cdcd"
pink      = "#f5c2e7"
mauve     = "#cba6f7"
red       = "#f38ba8"
maroon    = "#eba0ac"
peach     = "#fab387"
yellow    = "#f9e2af"
green     = "#a6e3a1"
teal      = "#94e2d5"
sky       = "#89dceb"
sapphire  = "#74c7ec"
blue      = "#89b4fa"
lavender  = "#b4befe"
text      = "#cdd6f4"
subtext1  = "#bac2de"
subtext0  = "#a6adc8"
overlay2  = "#9399b2"
overlay1  = "#7f849c"
overlay0  = "#6c7086"
surface2  = "#585b70"
surface1  = "#45475a"
surface0  = "#313244"
base      = "#1e1e2e"
mantle    = "#181825"
crust     = "#11111b"

[directory]
style            = "bold fg:blue"
format           = "[$path]($style)[$read_only]($read_only_style) "
truncation_length = 3
truncation_symbol = "…/"
truncate_to_repo  = false
read_only         = " 󰌾"
read_only_style   = "fg:peach"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music"     = "󰝚 "
"Pictures"  = " "

[git_branch]
style  = "fg:green"
symbol = "\uf418 "
format = "[$symbol$branch]($style) "

[git_state]
format = "([$state( $progress_current/$progress_total)]($style) )"
style  = "fg:peach"

[git_status]
style      = "fg:overlay1"
format     = "[$all_status$ahead_behind]($style)"
conflicted = "[= ](fg:red)"
ahead      = "[⇡ ](fg:green)"
behind     = "[⇣ ](fg:red)"
diverged   = "[⇕ ](fg:yellow)"
untracked  = "[? ](fg:overlay1)"
stashed    = "[≡ ](fg:overlay1)"
modified   = "[! ](fg:yellow)"
staged     = "[+ ](fg:green)"
renamed    = "[» ](fg:blue)"
deleted    = "[✘ ](fg:red)"

[git_metrics]
added_style   = "fg:green"
deleted_style = "fg:red"
format        = "([+$added]($added_style) )([-$deleted]($deleted_style))"
disabled      = false

[character]
success_symbol = "[❯](bold fg:mauve)"
error_symbol   = "[❯](bold fg:red)"
vimcmd_symbol  = "[❮](bold fg:green)"

[cmd_duration]
min_time = 500
style    = "fg:overlay1"
format   = "[$duration ](fg:overlay1)"

[package]
style  = "fg:overlay2"
symbol = "󰏗 "
format = "[$symbol$version]($style) "
