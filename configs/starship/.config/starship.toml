[directory]
style = "bold fg:blue"
format = "[$path]($style)[$read_only]($read_only_style) "
truncation_length = 3
truncation_symbol = "ÔÇª/"
truncate_to_repo = false
read_only = " ¾░î¥"
read_only_style = "fg:peach"

[directory.substitutions]
"Documents" = "¾░êÖ "
"Downloads" = "´ÇÖ "
"Music" = "¾░ØÜ "
"Pictures" = "´Ç¥ "

[custom.git_host]
command = '''
url="$(git remote get-url origin 2>/dev/null)" || exit 1
case "$url" in
  *github.com*|*github:*) echo "¾░èñ" ;;
  *gitlab.com*|*gitlab:*) echo "¾░«á" ;;
  *bitbucket.org*|*bitbucket:*) echo "¾░é¿" ;;
  *codeberg.org*|*codeberg:*) echo "¾░×ü" ;;
  *) exit 1 ;;
esac
'''
when = '''
git remote get-url origin 2>/dev/null | grep -qE '(github|gitlab|bitbucket|codeberg)'
'''
require_repo = true
shell = ["bash"]
format = "[$output]($style) "
style = "fg:overlay1"
description = "Git forge host icon"

[git_branch]
style = "fg:green"
symbol = "´Éÿ "
format = "[$symbol$branch]($style) "

[git_state]
format = "([$state( $progress_current/$progress_total)]($style) )"
